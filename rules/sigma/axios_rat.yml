title: Axios RAT - system.bat Dropped to ProgramData
id: c3d4e5f6-a7b8-9012-cdef-012345678901
status: experimental
description: Detects system.bat persistence script written to ProgramData
logsource:
  category: file_event
  product: windows
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\wt.exe'
    TargetFilename: 'C:\ProgramData\system.bat'
  condition: selection
level: high
tags:
  - attack.persistence
  - attack.t1547.001

