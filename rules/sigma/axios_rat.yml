title: Axios RAT - Linux Python RAT Execution
id: a7b8c9d0-e1f2-3456-abcd-456789012345
status: experimental
description: Detects execution of the Linux Python RAT from /tmp
logsource:
  category: process_creation
  product: linux
detection:
  selection:
