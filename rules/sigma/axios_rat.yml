title: Axios RAT - npm postinstall Dropper Execution
id: b8c9d0e1-f2a3-4567-bcde-567890123456
status: experimental
description: Detects npm postinstall executing the axios dropper
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    ParentCommandLine|contains: 'npm'
    CommandLine|contains|all:
      - 'node'
      - 'setup.js'
  condition: selection
level: medium
tags:
  - attack.execution
  - attack.t1204.002
