title: Axios RAT - macOS com.apple.act.mond Masquerading
id: f6a7b8c9-d0e1-2345-fabc-345678901234
status: experimental
description: Detects the macOS RAT masquerading as an Apple daemon
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    Image|endswith: '/com.apple.act.mond'
  filter:
    Image|startswith: '/System/'
  condition: selection and not filter
level: critical
tags:
  - attack.defense_evasion
  - attack.t1036.004

