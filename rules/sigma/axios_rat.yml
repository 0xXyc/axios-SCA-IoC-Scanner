title: Axios RAT - Process Injection via Extension.SubRoutine
id: e5f6a7b8-c9d0-1234-efab-234567890123
status: experimental
description: Detects .NET reflection loading of the axios RAT injector DLL
logsource:
  category: ps_script
  product: windows
detection:
  selection:
    ScriptBlockText|contains|all:
      - 'Extension.SubRoutine'
      - 'Run2'
      - 'Assembly]::Load'
  condition: selection
level: critical
tags:
  - attack.defense_evasion
  - attack.t1055

