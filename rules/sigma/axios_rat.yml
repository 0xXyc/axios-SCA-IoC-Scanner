title: Axios RAT - Renamed PowerShell Binary (wt.exe LOLBin)
id: d4e5f6a7-b8c9-0123-defa-123456789012
status: experimental
description: Detects wt.exe in ProgramData running hidden PowerShell (axios RAT)
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image: 'C:\ProgramData\wt.exe'
    CommandLine|contains:
      - '-w hidden'
      - '-ep bypass'
  condition: selection
level: critical
tags:
  - attack.defense_evasion
  - attack.t1036.003

