title: Axios RAT - Windows Registry Persistence
id: a1b2c3d4-e5f6-7890-abcd-ef0123456789
status: experimental
description: Detects MicrosoftUpdate registry persistence created by the axios RAT
logsource:
  category: registry_set
  product: windows
detection:
  selection:
    TargetObject|endswith: '\Software\Microsoft\Windows\CurrentVersion\Run\MicrosoftUpdate'
    Details|contains: 'system.bat'
  condition: selection
level: high
tags:
  - attack.persistence
  - attack.t1547.001

---

title: Axios RAT - PowerShell Download Cradle via scriptblock::Create
id: b2c3d4e5-f6a7-8901-bcde-f01234567890
status: experimental
description: Detects the PowerShell download cradle used by the axios RAT
logsource:
  category: ps_script
  product: windows
detection:
  selection:
    ScriptBlockText|contains|all:
      - 'scriptblock]::Create'
      - 'Invoke-WebRequest'
      - 'packages.npm.org/product'
  condition: selection
level: critical
tags:
  - attack.execution
  - attack.t1059.001

